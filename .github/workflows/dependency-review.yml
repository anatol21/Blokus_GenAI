name: dependency-review

on:
  pull_request:
    paths:
      - pyproject.toml
      - setup.py
      - setup.cfg
      - requirements*.txt
      - "**/requirements*.txt"

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
